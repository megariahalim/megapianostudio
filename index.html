<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Piano Studio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, h1, h2, h3, p, a {
            font-family: "Times New Roman", Times, serif;
        }
        body {
            background-color: #ffd145;
            display: flex;
            min-height: 100vh;
        }

        .page-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #ffd145;
            padding-top: 40px;
            border-right: 2px solid #d4c200;
            flex-shrink: 0;
        }

        .sidebar h2 {
            margin-top: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: #222;
            text-decoration: none;
            padding: 15px 25px;
            font-size: 18px;
        }

        .sidebar-image {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sidebar-image img {
            width: 100%;
            height: auto;
            border-bottom: 2px solid #d4c200;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }
        .hero p {
            font-size: 1.4rem;
        }

        .video-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .video-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            max-width: 560px;
        }

        .video-card h3 {
            text-align: center;
            margin-bottom: 10px;
        }

        iframe {
            border: none;
            border-radius: 8px;
        }

        section {
            margin-top: 80px;
        }

        section h2 {
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            body {
                flex-direction: column;
            }

            .content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <nav class="sidebar">

        <div class="sidebar-image">
            <img src="mp.png" alt="Mega Piano Studio">
        </div>

        <a href="about.html">About</a>
        <a href="courses.html">Courses</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>

    </nav>

    <main class="content">

        <div class="hero">
            <h1>Mega Piano Studio</h1>
            <p>Piano lessons, performance, and musical development.</p>
        </div>

        <div class="video-section">

            <div class="video-card">
                <h3>Performance Video</h3>
                <iframe width="560" height="315"
                    src="https://www.youtube.com/embed/JRCbvf8w7BA"
                    allowfullscreen></iframe>
            </div>

            <div class="video-card">
                <h3>Performance Video</h3>
                <iframe width="560" height="315"
                    src="https://www.youtube.com/embed/VAVt9ZtAkmc"
                    allowfullscreen></iframe>
            </div>

        </div>

        <section id="welcome">
            <h2>Welcome to Mega Piano Studio</h2>
            <p>...</p>
        </section>

    </main>

</div>

</body>
</html>
